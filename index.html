<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="今日目标">
<meta name="theme-color" content="#0a0a0f">
<title>今日目标</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --surface2: #1c1c26;
    --border: rgba(255,255,255,0.07);
    --text: #e8e8f0;
    --muted: #6b6b80;
    --accent: #7c6aff;
    --accent2: #ff6a8e;
    --done: #3dd68c;
    --done-bg: rgba(61,214,140,0.1);
    --warn: #ffb340;
    --radius: 18px;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans SC', sans-serif;
    min-height: 100dvh;
    overflow-x: hidden;
    padding-bottom: calc(20px + var(--safe-bottom));
  }

  /* ─── HEADER ─── */
  header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(10,10,15,0.85);
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    padding: calc(var(--safe-top) + 16px) 20px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .header-left h1 {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.5px;
    line-height: 1;
  }
  .header-left .date-label {
    font-size: 18px;
    color: var(--muted);
    margin-top: 4px;
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.5px;
  }

  .add-btn {
    width: 38px; height: 38px;
    border-radius: 50%;
    background: var(--accent);
    border: none;
    color: #fff;
    font-size: 22px;
    line-height: 1;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 4px 20px rgba(124,106,255,0.4);
    transition: transform 0.15s, box-shadow 0.15s;
    flex-shrink: 0;
  }
  .add-btn:active { transform: scale(0.9); box-shadow: 0 2px 8px rgba(124,106,255,0.3); }

  /* ─── CHART SECTION ─── */
  .chart-section {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 28px 20px 20px;
    position: relative;
  }

  .ring-wrap {
    position: relative;
    width: 180px; height: 180px;
  }
  .ring-wrap svg { transform: rotate(-90deg); }

  .ring-bg { fill: none; stroke: var(--surface2); stroke-width: 14; }
  .ring-fill {
    fill: none;
    stroke-width: 14;
    stroke-linecap: round;
    stroke: var(--accent);
    transition: stroke-dashoffset 0.7s cubic-bezier(0.34,1.56,0.64,1),
                stroke 0.5s ease;
    filter: drop-shadow(0 0 8px rgba(124,106,255,0.6));
  }

  .ring-center {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 2px;
  }
  .pct-num {
    font-size: 48px;
    font-weight: 700;
    letter-spacing: -2px;
    line-height: 1;
    font-family: 'DM Mono', monospace;
  }
  .pct-sym { font-size: 26px; color: var(--muted); }
  .pct-label {
    font-size: 17px;
    color: var(--muted);
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .stats-row {
    display: flex;
    gap: 20px;
    margin-top: 20px;
  }
  .stat-pill {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 30px;
    padding: 8px 18px;
    text-align: center;
  }
  .stat-pill .val { font-size: 26px; font-weight: 700; font-family: 'DM Mono', monospace; }
  .stat-pill .lbl { font-size: 17px; color: var(--muted); margin-top: 1px; }
  .stat-pill.done .val { color: var(--done); }
  .stat-pill.pending .val { color: var(--warn); }

  /* ─── GOALS LIST ─── */
  .section-title {
    font-size: 18px;
    color: var(--muted);
    letter-spacing: 1.5px;
    text-transform: uppercase;
    padding: 0 20px;
    margin-bottom: 10px;
    font-family: 'DM Mono', monospace;
  }

  .goals-list {
    padding: 0 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── swipe row wrapper ── */
  .swipe-row {
    position: relative;
    border-radius: var(--radius);
    overflow: hidden;
    animation: slideIn 0.3s ease both;
  }

  /* 背景操作层：左侧编辑，右侧删除，左划时从右边露出 */
  .swipe-bg {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: stretch;
    justify-content: flex-end;
  }
  .swipe-action {
    width: 88px;
    display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 5px;
    color: #fff; font-size: 14px; font-weight: 600;
    cursor: pointer; flex-shrink: 0;
    border: none; outline: none;
    transition: filter 0.15s;
  }
  .swipe-action:active { filter: brightness(0.85); }
  .swipe-action.edit-action { background: var(--accent); }
  .swipe-action.del-action  { background: var(--accent2); }

  /* 前景卡片 */
  .goal-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    display: flex;
    align-items: center;
    gap: 14px;
    position: relative;
    z-index: 1;
    will-change: transform;
    touch-action: auto;
  }
  .goal-card.snap {
    transition: transform 0.28s cubic-bezier(0.25,1,0.5,1), border-color 0.3s, background 0.3s;
  }
  .goal-card.completed {
    background: var(--done-bg);
    border-color: rgba(61,214,140,0.25);
  }
  .goal-card.completed::before {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(90deg, rgba(61,214,140,0.05), transparent);
    pointer-events: none;
    border-radius: var(--radius);
  }

  /* checkbox */
  .check-btn {
    width: 32px; height: 32px;
    border-radius: 50%;
    border: 7px solid rgba(255,255,255,0.95);
    background: transparent;
    cursor: pointer; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    transition: border-color 0.2s, background 0.2s, transform 0.15s;
  }
  .goal-card.completed .check-btn { background: var(--done); border-color: var(--done); }
  .check-icon {
    width: 16px; height: 16px;
    stroke: #fff; fill: none;
    stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round;
    opacity: 0; transform: scale(0.5);
    transition: opacity 0.2s, transform 0.2s;
  }
  .goal-card.completed .check-icon { opacity: 1; transform: scale(1); }

  /* goal text */
  .goal-body { flex: 1; min-width: 0; }
  .goal-text {
    font-size: 20px; font-weight: 400; line-height: 1.4;
    transition: color 0.3s; word-break: break-all;
  }
  .goal-card.completed .goal-text {
    color: var(--done);
  }

  /* 滑动提示 */
  .swipe-hint {
    text-align: center; font-size: 16px;
    color: #ffffff; opacity: 0.75;
    margin: 2px 0 12px; letter-spacing: 0.3px;
  }

  /* ─── 操作菜单 Sheet ─── */
  .action-sheet-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    z-index: 300;
    display: flex; align-items: flex-end;
    padding-bottom: var(--safe-bottom);
    opacity: 0; pointer-events: none;
    transition: opacity 0.22s;
  }
  .action-sheet-overlay.show { opacity: 1; pointer-events: all; }

  .action-sheet {
    width: 100%;
    background: var(--surface);
    border-radius: 24px 24px 0 0;
    border-top: 1px solid var(--border);
    padding: 16px 16px 20px;
    transform: translateY(20px);
    transition: transform 0.28s cubic-bezier(0.34,1.4,0.64,1);
  }
  .action-sheet-overlay.show .action-sheet { transform: translateY(0); }

  .sheet-handle {
    width: 40px; height: 4px; background: var(--muted);
    border-radius: 2px; margin: 0 auto 16px; opacity: 0.35;
  }
  .sheet-title {
    font-size: 14px; color: var(--muted);
    text-align: center; margin-bottom: 14px;
    padding: 0 8px; overflow: hidden;
    text-overflow: ellipsis; white-space: nowrap;
  }
  .sheet-btn {
    width: 100%; padding: 16px;
    border-radius: 14px; border: none;
    font-size: 18px; font-weight: 600;
    font-family: 'Noto Sans SC', sans-serif;
    cursor: pointer; display: flex;
    align-items: center; gap: 12px;
    margin-bottom: 10px;
    transition: opacity 0.12s, transform 0.12s;
  }
  .sheet-btn:last-child { margin-bottom: 0; }
  .sheet-btn:active { opacity: 0.8; transform: scale(0.98); }
  .sheet-btn.edit { background: rgba(124,106,255,0.12); color: var(--accent); }
  .sheet-btn.del  { background: rgba(255,106,142,0.12); color: var(--accent2); }
  .sheet-btn.cancel-btn { background: var(--surface2); color: var(--muted); justify-content: center; margin-top: 4px; }

  /* ─── 确认 Sheet ─── */
  .confirm-sheet-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.65);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    z-index: 400;
    display: flex; align-items: flex-end;
    padding-bottom: var(--safe-bottom);
    opacity: 0; pointer-events: none;
    transition: opacity 0.22s;
  }
  .confirm-sheet-overlay.show { opacity: 1; pointer-events: all; }
  .confirm-sheet-overlay .action-sheet { background: var(--surface2); }

  /* ─── EMPTY STATE ─── */
  .empty-state {
    text-align: center;
    padding: 48px 20px;
    color: var(--muted);
  }
  .empty-state .emoji { font-size: 48px; margin-bottom: 12px; }
  .empty-state p { font-size: 21px; line-height: 1.6; }

  /* ─── MODAL ─── */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    z-index: 200;
    display: flex;
    align-items: flex-end;
    padding-bottom: var(--safe-bottom);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s;
  }
  .modal-overlay.show { opacity: 1; pointer-events: all; }

  .modal-sheet {
    width: 100%;
    background: var(--surface);
    border-radius: 24px 24px 0 0;
    border-top: 1px solid var(--border);
    padding: 20px 20px 32px;
    transform: translateY(30px);
    transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
  }
  .modal-overlay.show .modal-sheet { transform: translateY(0); }

  .modal-handle {
    width: 40px; height: 4px;
    background: var(--muted);
    border-radius: 2px;
    margin: 0 auto 20px;
    opacity: 0.4;
  }
  .modal-title { font-size: 24px; font-weight: 700; margin-bottom: 16px; }
  .modal-input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px 16px;
    color: var(--text);
    font-size: 22px;
    font-family: 'Noto Sans SC', sans-serif;
    outline: none;
    transition: border-color 0.2s;
  }
  .modal-input:focus { border-color: var(--accent); }
  .modal-actions { display: flex; gap: 10px; margin-top: 16px; }

  .btn {
    flex: 1;
    padding: 14px;
    border-radius: 14px;
    border: none;
    font-size: 21px;
    font-weight: 700;
    cursor: pointer;
    font-family: 'Noto Sans SC', sans-serif;
    transition: transform 0.12s, opacity 0.12s;
  }
  .btn:active { transform: scale(0.96); opacity: 0.85; }
  .btn-primary { background: var(--accent); color: #fff; box-shadow: 0 4px 16px rgba(124,106,255,0.35); }
  .btn-cancel { background: var(--surface2); color: var(--muted); }



  /* celebration */
  @keyframes pop { 0%{transform:scale(1)} 50%{transform:scale(1.15)} 100%{transform:scale(1)} }
  .pop { animation: pop 0.35s ease; }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <h1>今日目标 ✦</h1>
    <div class="date-label" id="dateLabel"></div>
  </div>
  <button class="add-btn" onclick="openAddModal()" aria-label="添加目标">
    <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
      <line x1="9" y1="3" x2="9" y2="15"/><line x1="3" y1="9" x2="15" y2="9"/>
    </svg>
  </button>
</header>

<!-- Chart -->
<div class="chart-section">
  <div class="ring-wrap" id="ringWrap">
    <svg width="180" height="180" viewBox="0 0 180 180">
      <circle class="ring-bg" cx="90" cy="90" r="76"/>
      <circle class="ring-fill" id="ringFill" cx="90" cy="90" r="76"
        stroke-dasharray="477.5" stroke-dashoffset="477.5"/>
    </svg>
    <div class="ring-center">
      <div style="display:flex;align-items:baseline;gap:2px">
        <span class="pct-num" id="pctNum">0</span>
        <span class="pct-sym">%</span>
      </div>
      <div class="pct-label">完成度</div>
    </div>
  </div>
  <div class="stats-row">
    <div class="stat-pill done">
      <div class="val" id="doneCount">0</div>
      <div class="lbl">已完成</div>
    </div>
    <div class="stat-pill">
      <div class="val" id="totalCount">0</div>
      <div class="lbl">总目标</div>
    </div>
    <div class="stat-pill pending">
      <div class="val" id="pendingCount">0</div>
      <div class="lbl">待完成</div>
    </div>
  </div>
</div>

<!-- Goals -->
<div class="section-title">目 标 列 表</div>
<div class="swipe-hint">＋ 右上角添加目标 &nbsp;·&nbsp; ← 左划编辑 / 删除</div>
<div class="goals-list" id="goalsList"></div>



<!-- 操作菜单 Sheet（左划后弹出） -->
<div class="action-sheet-overlay" id="actionSheet" onclick="if(event.target===this)closeActionSheet()">
  <div class="action-sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title" id="actionSheetTitle"></div>
    <button class="sheet-btn edit" onclick="actionEdit()">
      <svg width="20" height="20" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M9.5 1.5l3 3-7.5 7.5H2v-3L9.5 1.5z"/></svg>
      编辑目标
    </button>
    <button class="sheet-btn del" onclick="actionDelete()">
      <svg width="20" height="20" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><polyline points="3,4 13,4"/><path d="M5,4V3h6v1"/><path d="M4,4l1,9h6l1-9"/></svg>
      删除目标
    </button>
    <button class="sheet-btn cancel-btn" onclick="closeActionSheet()">取消</button>
  </div>
</div>

<!-- 编辑确认 Sheet -->
<div class="action-sheet-overlay" id="editSheet" onclick="if(event.target===this)closeEditSheet()">
  <div class="action-sheet">
    <div class="sheet-handle"></div>
    <div class="modal-title" id="editSheetTitle" style="margin-bottom:14px">编辑目标</div>
    <input class="modal-input" id="editSheetInput" placeholder="输入目标名称…" maxlength="60"
      onkeydown="if(event.key==='Enter')confirmEdit()">
    <div class="modal-actions" style="margin-top:14px">
      <button class="btn btn-cancel" onclick="closeEditSheet()">取消</button>
      <button class="btn btn-primary" onclick="confirmEdit()">确 定</button>
    </div>
  </div>
</div>

<!-- 删除确认 Sheet -->
<div class="confirm-sheet-overlay" id="deleteSheet" onclick="if(event.target===this)closeDeleteSheet()">
  <div class="action-sheet">
    <div class="sheet-handle"></div>
    <div class="modal-title" style="color:var(--accent2);margin-bottom:10px">确认删除？</div>
    <p style="font-size:17px;color:var(--muted);line-height:1.6;margin-bottom:18px">即将删除 <span id="deleteSheetText" style="color:var(--text);font-weight:600"></span>，此操作无法撤销。</p>
    <div class="modal-actions">
      <button class="btn btn-cancel" onclick="closeDeleteSheet()">取消</button>
      <button class="btn" style="background:var(--accent2);color:#fff;box-shadow:0 4px 16px rgba(255,106,142,0.3)" onclick="confirmDelete()">确 定 删 除</button>
    </div>
  </div>
</div>

<!-- Add Modal -->
<div class="modal-overlay" id="modalOverlay" onclick="onOverlayClick(event)">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title" id="modalTitle">添加新目标</div>
    <input class="modal-input" id="modalInput" placeholder="输入目标名称…" maxlength="60"
      onkeydown="if(event.key==='Enter')confirmModal()">
    <div class="modal-actions">
      <button class="btn btn-cancel" onclick="closeModal()">取消</button>
      <button class="btn btn-primary" onclick="confirmModal()">确 定</button>
    </div>
  </div>
</div>

<script>
// ─── State ───
const STORAGE_KEY = 'daily_goals_v2';
const DATE_KEY = 'daily_goals_date_v2';

let goals = [];     // [{id, text, done}]

// ─── Init ───
function todayStr() {
  return new Date().toLocaleDateString('zh-CN', {year:'numeric',month:'2-digit',day:'2-digit'});
}

function load() {
  const savedDate = localStorage.getItem(DATE_KEY);
  const today = todayStr();
  const raw = localStorage.getItem(STORAGE_KEY);
  if (raw) {
    const parsed = JSON.parse(raw);
    goals = parsed.goals || [];
    // New day: reset done state but keep goals
    if (savedDate !== today) {
      goals = goals.map(g => ({...g, done: false}));
      localStorage.setItem(DATE_KEY, today);
      save();
    }
  } else {
    // Default starter goals
    goals = [
      {id: uid(), text: '晨间锻炼 30 分钟', done: false},
      {id: uid(), text: '阅读专业书籍', done: false},
      {id: uid(), text: '英语口语练习', done: false},
    ];
    localStorage.setItem(DATE_KEY, today);
    save();
  }
}

function save() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify({goals}));
}

function uid() {
  return Math.random().toString(36).slice(2,9);
}

// ─── Render ───
function render() {
  const list = document.getElementById('goalsList');
  const done = goals.filter(g => g.done).length;
  const total = goals.length;
  const pct = total ? Math.round(done / total * 100) : 0;

  // Ring
  const circ = 477.5;
  const offset = circ - (pct / 100) * circ;
  const ring = document.getElementById('ringFill');
  ring.style.strokeDashoffset = offset;
  if (pct === 100) {
    ring.style.stroke = 'var(--done)';
    ring.style.filter = 'drop-shadow(0 0 12px rgba(61,214,140,0.7))';
  } else {
    ring.style.stroke = 'var(--accent)';
    ring.style.filter = 'drop-shadow(0 0 8px rgba(124,106,255,0.6))';
  }

  document.getElementById('pctNum').textContent = pct;
  document.getElementById('doneCount').textContent = done;
  document.getElementById('totalCount').textContent = total;
  document.getElementById('pendingCount').textContent = total - done;

  // Goals list
  if (goals.length === 0) {
    list.innerHTML = `<div class="empty-state">
      <div class="emoji">🎯</div>
      <p>还没有目标<br>点击右上角 <strong>+</strong> 添加你的第一个目标</p>
    </div>`;
    return;
  }

  list.innerHTML = '';
  goals.forEach((g, idx) => {
    // wrapper
    const row = document.createElement('div');
    row.className = 'swipe-row';
    row.style.animationDelay = (idx * 0.04) + 's';

    // 背景：已完成显示"已完成"，未完成显示编辑+删除
    if (g.done) {
      row.innerHTML = `<div class="swipe-bg" style="background:var(--done-bg)"></div>`;
    } else {
      row.innerHTML = `
        <div class="swipe-bg">
          <button class="swipe-action edit-action" onclick="openActionSheet('${g.id}','${escHtml(g.text).replace(/'/g,"\\'")}')">
            <svg width="20" height="20" viewBox="0 0 14 14" fill="none" stroke="#fff" stroke-width="1.8" stroke-linecap="round"><path d="M9.5 1.5l3 3-7.5 7.5H2v-3L9.5 1.5z"/></svg>
            编辑
          </button>
          <button class="swipe-action del-action" onclick="openActionSheet('${g.id}','${escHtml(g.text).replace(/'/g,"\\'")}')">
            <svg width="20" height="20" viewBox="0 0 16 16" fill="none" stroke="#fff" stroke-width="1.8" stroke-linecap="round"><polyline points="3,4 13,4"/><path d="M5,4V3h6v1"/><path d="M4,4l1,9h6l1-9"/></svg>
            删除
          </button>
        </div>`;
    }

    // 前景卡片（只有勾选按钮）
    const card = document.createElement('div');
    card.className = 'goal-card' + (g.done ? ' completed' : '');
    card.dataset.id = g.id;
    card.innerHTML = `
      <button class="check-btn" aria-label="完成">
        <svg class="check-icon" viewBox="0 0 16 16">
          <polyline points="2.5,8.5 6.5,12.5 13.5,3.5"/>
        </svg>
      </button>
      <div class="goal-body" style="cursor:pointer;display:flex;align-items:center;gap:10px">
        <div class="goal-text">${escHtml(g.text)}</div>
        ${g.done ? `<svg style="flex-shrink:0" width="24" height="24" viewBox="0 0 16 16" fill="none" stroke="var(--done)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="2.5,8.5 6.5,12.5 13.5,3.5"/></svg>` : ''}
      </div>`;

    // 点按钮或文字触发完成（用touchend+mouseup双保险，兼容iOS）
    let _tapStartX = 0, _tapStartY = 0;
    card.addEventListener('touchstart', (e) => {
      const t = e.touches[0];
      _tapStartX = t.clientX; _tapStartY = t.clientY;
    }, {passive: true});
    card.addEventListener('touchend', (e) => {
      if (card._swiped) return;
      const t = e.changedTouches[0];
      const dx = Math.abs(t.clientX - _tapStartX);
      const dy = Math.abs(t.clientY - _tapStartY);
      if (dx < 8 && dy < 8) toggleDone(g.id);
    }, {passive: true});
    card.addEventListener('mouseup', () => {
      if (!card._swiped) toggleDone(g.id);
    });
    row.appendChild(card);
    list.appendChild(row);

    // 已完成不允许左划
    if (!g.done) initSwipe(card, g.id);
  });
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ─── Swipe ───
const THRESHOLD = 68;
const MAX_DRAG  = 180; // 两个按钮宽度

function initSwipe(card, id) {
  let startX = 0, startY = 0, curX = 0, dragging = false, locked = false;

  function onStart(e) {
    closeAllCards(card);
    const t = e.touches ? e.touches[0] : e;
    startX = t.clientX; startY = t.clientY;
    curX = 0; dragging = false; locked = false;
    card._swiped = false;
    card.classList.remove('snap');
  }

  function onMove(e) {
    const t = e.touches ? e.touches[0] : e;
    const dx = t.clientX - startX;
    const dy = t.clientY - startY;
    if (!dragging && !locked) {
      if (Math.abs(dx) < 5 && Math.abs(dy) < 5) return;
      if (Math.abs(dy) > Math.abs(dx)) { locked = true; return; }
      dragging = true;
    }
    if (locked) return;
    e.preventDefault();
    card._swiped = true;
    curX = Math.min(0, Math.max(-MAX_DRAG, dx));
    card.style.transform = `translateX(${curX}px)`;
  }

  function onEnd() {
    if (!dragging) return;
    card.classList.add('snap');
    if (curX < -THRESHOLD) {
      card.style.transform = 'translateX(-176px)';
      const g = goals.find(x => x.id === id);
      if (g) setTimeout(() => openActionSheet(id, g.text), 120);
    } else {
      card._swiped = false;
      card.style.transform = 'translateX(0)';
    }
  }

  card.addEventListener('touchstart', onStart, {passive: true});
  card.addEventListener('touchmove',  onMove,  {passive: false});
  card.addEventListener('touchend',   onEnd);
}

function closeAllCards(except) {
  document.querySelectorAll('.goal-card').forEach(c => {
    if (c !== except) {
      c.classList.add('snap');
      c.style.transform = 'translateX(0)';
    }
  });
}

// ─── Action Sheet（左划后菜单） ───
let _actionId = null;

function openActionSheet(id, text) {
  closeAllCards();
  document.querySelectorAll('.goal-card').forEach(c => c._swiped = false);
  _actionId = id;
  document.getElementById('actionSheetTitle').textContent = text;
  document.getElementById('actionSheet').classList.add('show');
}
function closeActionSheet() {
  document.getElementById('actionSheet').classList.remove('show');
}

function actionEdit() {
  closeActionSheet();
  const g = goals.find(x => x.id === _actionId);
  if (!g) return;
  document.getElementById('editSheetTitle').textContent = '编辑目标';
  document.getElementById('editSheetInput').value = g.text;
  document.getElementById('editSheet').classList.add('show');
  setTimeout(() => document.getElementById('editSheetInput').focus(), 300);
}
function closeEditSheet() {
  document.getElementById('editSheet').classList.remove('show');
}
function confirmEdit() {
  const val = document.getElementById('editSheetInput').value.trim();
  if (!val) return;
  const g = goals.find(x => x.id === _actionId);
  if (g) { g.text = val; save(); render(); }
  closeEditSheet();
}

function actionDelete() {
  closeActionSheet();
  const g = goals.find(x => x.id === _actionId);
  if (!g) return;
  document.getElementById('deleteSheetText').textContent = `「${g.text}」`;
  document.getElementById('deleteSheet').classList.add('show');
}
function closeDeleteSheet() {
  document.getElementById('deleteSheet').classList.remove('show');
}
function confirmDelete() {
  closeDeleteSheet();
  goals = goals.filter(g => g.id !== _actionId);
  save();
  render();
}

// ─── Actions ───
function toggleDone(id) {
  const g = goals.find(x => x.id === id);
  if (!g) return;
  g.done = !g.done;
  save();
  render();
  if (g.done) {
    const ring = document.getElementById('ringWrap');
    ring.classList.remove('pop');
    void ring.offsetWidth;
    ring.classList.add('pop');
  }
}

function deleteGoal(id) {
  goals = goals.filter(g => g.id !== id);
  save();
  render();
}

function confirmReset() {
  if (goals.some(g => g.done)) {
    if (!confirm('确定要重置今日所有进度吗？')) return;
    goals = goals.map(g => ({...g, done: false}));
    save();
    render();
  }
}

// ─── Add Modal ───
function openAddModal() {
  document.getElementById('modalInput').value = '';
  document.getElementById('modalOverlay').classList.add('show');
  setTimeout(() => document.getElementById('modalInput').focus(), 300);
}
function closeModal() {
  document.getElementById('modalOverlay').classList.remove('show');
}
function onOverlayClick(e) {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
}
function confirmModal() {
  const val = document.getElementById('modalInput').value.trim();
  if (!val) return;
  goals.push({id: uid(), text: val, done: false});
  save();
  render();
  closeModal();
}

// ─── Date label ───
function setDate() {
  const now = new Date();
  const opts = {weekday:'long', year:'numeric', month:'long', day:'numeric'};
  document.getElementById('dateLabel').textContent = now.toLocaleDateString('zh-CN', opts);
}

// ─── Boot ───
load();
setDate();
render();
</script>
